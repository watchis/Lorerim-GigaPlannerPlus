name: Pages build check

on:
  pull_request:

permissions:
  contents: read

jobs:
  pages-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify Pages artifact excludes dev tools
        run: |
          if [ -d dist/tools ] || find dist -name '*.mjs' -print -quit | grep -q .; then
            echo "dist must not contain tools/ or Node import scripts"
            find dist -name '*.mjs' -o -path 'dist/tools/*'
            exit 1
          fi

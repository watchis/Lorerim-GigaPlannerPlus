name: Dependencies

on:
  workflow_dispatch:
  schedule:
    # Weekly on Monday at 09:30 UTC, shortly after Dependabot opens PRs.
    - cron: "30 9 * * 1"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Report outdated packages
        run: npm outdated || true

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Audit all dependencies
        run: npm audit

      - run: npm test
